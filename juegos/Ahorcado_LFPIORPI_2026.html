<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahorcado LFPIORPI 2026 — Consorcio Peredo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0D2137;
    --navy2:   #1C3557;
    --red:     #B91C1C;
    --darkred: #7F1D1D;
    --amber:   #D97706;
    --green:   #166534;
    --teal:    #0E7490;
    --cream:   #FDF8F0;
    --smoke:   #F1EDE6;
    --ink:     #1A1A1A;
    --muted:   #6B7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* Fondo con textura */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ──────────────────────────────────────────────────────── */
  header {
    width: 100%; max-width: 820px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 0 16px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    position: relative; z-index: 1;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 4px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px;
    color: var(--cream);
  }

  .game-title span { color: var(--amber); }

  /* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
  main {
    width: 100%; max-width: 820px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 32px;
    margin-top: 32px;
    position: relative; z-index: 1;
  }

  /* ── PANEL IZQUIERDO: HORCA ──────────────────────────────────────── */
  .gallows-panel {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }

  .gallows-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
  }

  svg#gallows {
    width: 100%; height: 200px;
    display: block;
  }

  /* Contador de intentos */
  .attempts-display {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
  }

  .attempts-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .attempts-dots {
    display: flex; gap: 8px; justify-content: center;
  }

  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.3s ease;
  }

  .dot.used { background: var(--red); border-color: var(--red); }

  /* Número de palabra */
  .word-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-align: center;
  }

  /* ── PANEL DERECHO: JUEGO ────────────────────────────────────────── */
  .game-panel {
    display: flex; flex-direction: column; gap: 24px;
  }

  /* Pista */
  .hint-box {
    background: linear-gradient(135deg, rgba(13,33,55,0.8), rgba(28,53,87,0.8));
    border: 1px solid rgba(255,255,255,0.12);
    border-left: 4px solid var(--amber);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .hint-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .hint-text {
    font-size: 14px; line-height: 1.6;
    color: rgba(255,255,255,0.85);
  }

  /* Tablero de letras */
  .word-board {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    min-height: 72px; align-items: center;
  }

  .letter-slot {
    width: 44px; height: 56px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    gap: 4px;
  }

  .letter-slot .revealed {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; line-height: 1;
    color: var(--cream);
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }

  .letter-slot .revealed.new {
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: var(--amber);
  }

  @keyframes popIn {
    0%   { transform: scale(0) rotateY(90deg); opacity: 0; }
    100% { transform: scale(1) rotateY(0deg); opacity: 1; }
  }

  .letter-slot .underline {
    width: 36px; height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  /* Teclado */
  .keyboard {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  }

  .key {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    color: var(--cream);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
    text-transform: uppercase;
  }

  .key:hover:not(:disabled) {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.35);
    transform: translateY(-2px);
  }

  .key:disabled { cursor: default; }
  .key.correct { background: rgba(22,101,52,0.5); border-color: var(--green); color: var(--cream); }
  .key.wrong   { background: rgba(127,29,29,0.4); border-color: var(--red); color: rgba(255,255,255,0.3); }

  /* ── ESTADO DEL JUEGO ────────────────────────────────────────────── */
  .status-bar {
    display: flex; align-items: center; justify-content: center;
    min-height: 48px;
  }

  .status-msg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }

  .status-msg.show { opacity: 1; transform: translateY(0); }
  .status-msg.win  { color: #4ADE80; }
  .status-msg.lose { color: var(--red); }

  /* ── BTN SIGUIENTE ───────────────────────────────────────────────── */
  .btn-next {
    display: none;
    margin: 0 auto;
    padding: 12px 36px;
    background: var(--amber);
    border: none; border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(217,119,6,0.4); }
  .btn-next.visible { display: block; }

  /* ── PANTALLA FINAL ──────────────────────────────────────────────── */
  #end-screen {
    display: none;
    width: 100%; max-width: 820px;
    margin-top: 40px;
    text-align: center;
    position: relative; z-index: 1;
  }

  #end-screen.visible { display: block; }

  .end-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .score-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    color: var(--amber);
    margin-bottom: 32px;
  }

  .words-review {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px; text-align: left; margin-bottom: 32px;
  }

  .word-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 4px solid var(--teal);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .word-card .wc-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    color: var(--cream); margin-bottom: 6px;
  }

  .word-card .wc-hint {
    font-size: 12px; line-height: 1.5;
    color: rgba(255,255,255,0.6);
  }

  .btn-restart {
    padding: 14px 48px;
    background: var(--navy2);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    color: var(--cream); cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-restart:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ── PROGRESS STRIP ─────────────────────────────────────────────── */
  .progress-strip {
    width: 100%; max-width: 820px;
    display: flex; gap: 8px; margin-top: 28px;
    position: relative; z-index: 1;
  }

  .prog-dot {
    flex: 1; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.1);
    transition: background 0.4s ease;
  }

  .prog-dot.done    { background: var(--green); }
  .prog-dot.current { background: var(--amber); }
  .prog-dot.failed  { background: var(--red); }

  /* ── FOOTER ─────────────────────────────────────────────────────── */
  footer {
    margin-top: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    position: relative; z-index: 1;
  }

  /* Responsive */
  @media (max-width: 600px) {
    main { grid-template-columns: 1fr; }
    .gallows-panel { flex-direction: row; flex-wrap: wrap; }
    .gallows-wrap { width: 160px; }
    .key { width: 34px; height: 34px; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">Consorcio Peredo · Taller 2026</span>
  <span class="game-title">AHORCADO <span>LFPIORPI</span></span>
  <span class="brand">GMC360 / 360EDUCA</span>
</header>

<!-- Barra de progreso -->
<div class="progress-strip" id="progressStrip"></div>

<main id="gameArea">
  <!-- Panel izquierdo: horca -->
  <div class="gallows-panel">
    <div class="gallows-wrap">
      <svg id="gallows" viewBox="0 0 160 200">
        <!-- Estructura permanente -->
        <line x1="20" y1="190" x2="140" y2="190" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="190" x2="50"  y2="20"  stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="20"  x2="110" y2="20"  stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="110" y1="20" x2="110" y2="40"  stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
        <!-- Partes del cuerpo (ocultas inicialmente) -->
        <!-- Cabeza -->
        <circle id="h-head" cx="110" cy="54" r="14" stroke="#EF4444" stroke-width="2.5" fill="none" opacity="0"/>
        <!-- Cuerpo -->
        <line id="h-body" x1="110" y1="68" x2="110" y2="120" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <!-- Brazo izq -->
        <line id="h-larm" x1="110" y1="80" x2="84"  y2="104" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <!-- Brazo der -->
        <line id="h-rarm" x1="110" y1="80" x2="136" y2="104" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <!-- Pierna izq -->
        <line id="h-lleg" x1="110" y1="120" x2="86" y2="152" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <!-- Pierna der -->
        <line id="h-rleg" x1="110" y1="120" x2="134" y2="152" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      </svg>
    </div>

    <div class="attempts-display">
      <div class="attempts-label">Intentos restantes</div>
      <div class="attempts-dots" id="attemptsDots"></div>
    </div>

    <div class="word-counter" id="wordCounter"></div>
  </div>

  <!-- Panel derecho: juego -->
  <div class="game-panel">
    <div class="hint-box">
      <div class="hint-label">📌 Pista</div>
      <div class="hint-text" id="hintText"></div>
    </div>

    <div class="word-board" id="wordBoard"></div>

    <div class="status-bar">
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="keyboard" id="keyboard"></div>

    <button class="btn-next" id="btnNext">SIGUIENTE PALABRA →</button>
  </div>
</main>

<!-- Pantalla final -->
<div id="end-screen">
  <div class="end-title" id="endTitle"></div>
  <div class="score-display" id="endScore"></div>
  <div class="words-review" id="wordsReview"></div>
  <button class="btn-restart" onclick="initGame()">⟳  JUGAR DE NUEVO</button>
</div>

<footer>TALLER LFPIORPI 2026 · CONSORCIO PEREDO · ART. 17 Y 54 LFPIORPI DOF 16-07-2025</footer>

<script>
const WORDS = [
  {
    word: "AVISO",
    hint: "Reporte obligatorio que se presenta ante la SHCP a más tardar el día 17 del mes siguiente a la operación que superó el umbral establecido en el Art. 17."
  },
  {
    word: "UMBRAL",
    hint: "Monto mínimo expresado en veces el valor diario de la UMA que activa las obligaciones de identificación o reporte bajo el Art. 17 de la LFPIORPI."
  },
  {
    word: "EFECTIVO",
    hint: "Medio de pago cuya recepción está prohibida por el Art. 32 a partir de ciertos montos. Para vehículos el límite es 3,210 UMA ($376,565 con UMA 2026)."
  },
  {
    word: "BENEFICIARIO",
    hint: "Persona física que en última instancia posee o controla más del 25% de una persona moral, o la controla por otros medios. Su identificación es obligatoria bajo el Art. 18 Fracc. III."
  },
  {
    word: "SANCION",
    hint: "Consecuencia jurídica del incumplimiento de la LFPIORPI. El Art. 54 establece tres niveles: de 200 a 2,000 UMA, de 2,000 a 10,000 UMA, y de 10,000 a 65,000 UMA o hasta el 100% del valor de la operación."
  }
];

const MAX_WRONG = 6;
const BODY_PARTS = ['h-head','h-body','h-larm','h-rarm','h-lleg','h-rleg'];
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

let wordIndex, wrongCount, guessed, currentWord, wordResults;

function initGame() {
  wordIndex   = 0;
  wordResults = [];
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('gameArea').style.display = '';
  loadWord();
}

function loadWord() {
  const entry    = WORDS[wordIndex];
  currentWord    = entry.word.toUpperCase();
  wrongCount     = 0;
  guessed        = new Set();

  // Reset horca
  BODY_PARTS.forEach(id => {
    document.getElementById(id).setAttribute('opacity','0');
  });

  // Pista
  document.getElementById('hintText').textContent = entry.hint;

  // Contador
  document.getElementById('wordCounter').textContent =
    `Palabra ${wordIndex + 1} de ${WORDS.length}`;

  // Tablero
  renderBoard();

  // Intentos
  renderDots();

  // Teclado
  renderKeyboard();

  // Status
  const msg = document.getElementById('statusMsg');
  msg.textContent = '';
  msg.className   = 'status-msg';

  // Btn siguiente
  const btn = document.getElementById('btnNext');
  btn.classList.remove('visible');
  btn.textContent = wordIndex < WORDS.length - 1
    ? 'SIGUIENTE PALABRA →'
    : 'VER RESULTADOS →';

  // Progress
  renderProgress();
}

function renderBoard() {
  const board = document.getElementById('wordBoard');
  board.innerHTML = '';
  [...currentWord].forEach(letter => {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';

    const rev = document.createElement('div');
    rev.className = 'revealed';
    rev.id        = 'slot-' + letter + '-' + Math.random().toString(36).slice(2,6);
    rev.dataset.letter = letter;
    rev.textContent = guessed.has(letter) ? letter : '';

    const ul = document.createElement('div');
    ul.className = 'underline';

    slot.appendChild(rev);
    slot.appendChild(ul);
    board.appendChild(slot);
  });
}

function renderDots() {
  const wrap = document.getElementById('attemptsDots');
  wrap.innerHTML = '';
  for (let i = 0; i < MAX_WRONG; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < wrongCount ? ' used' : '');
    wrap.appendChild(d);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ALPHABET.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'key';
    btn.textContent = letter;
    btn.onclick = () => guess(letter, btn);
    kb.appendChild(btn);
  });
}

function renderProgress() {
  const strip = document.getElementById('progressStrip');
  strip.innerHTML = '';
  WORDS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot';
    if (i < wordIndex) {
      d.classList.add(wordResults[i] ? 'done' : 'failed');
    } else if (i === wordIndex) {
      d.classList.add('current');
    }
    strip.appendChild(d);
  });
}

function guess(letter, btn) {
  if (guessed.has(letter)) return;
  guessed.add(letter);

  const isCorrect = currentWord.includes(letter);

  // Animar botón
  btn.disabled = true;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    // Revelar en tablero con animación
    document.querySelectorAll('[data-letter="' + letter + '"]').forEach(el => {
      el.textContent = letter;
      el.classList.add('new');
      setTimeout(() => el.classList.remove('new'), 600);
    });
    checkWin();
  } else {
    wrongCount++;
    renderDots();
    // Mostrar parte del cuerpo
    const part = document.getElementById(BODY_PARTS[wrongCount - 1]);
    if (part) {
      part.style.transition = 'opacity 0.4s ease';
      part.setAttribute('opacity','1');
    }
    checkLose();
  }
}

function checkWin() {
  const allRevealed = [...currentWord].every(l => guessed.has(l));
  if (!allRevealed) return;

  wordResults.push(true);
  const msg = document.getElementById('statusMsg');
  msg.textContent = '¡CORRECTO! 🎯';
  msg.className = 'status-msg win show';
  disableKeyboard();
  renderProgress();
  setTimeout(() => {
    document.getElementById('btnNext').classList.add('visible');
  }, 600);
}

function checkLose() {
  if (wrongCount < MAX_WRONG) return;

  wordResults.push(false);
  // Revelar la palabra
  document.querySelectorAll('.revealed').forEach(el => {
    if (!el.textContent) {
      el.textContent = el.dataset.letter;
      el.style.color = 'var(--red)';
    }
  });
  const msg = document.getElementById('statusMsg');
  msg.textContent = 'La palabra era: ' + currentWord;
  msg.className = 'status-msg lose show';
  disableKeyboard();
  renderProgress();
  setTimeout(() => {
    document.getElementById('btnNext').classList.add('visible');
  }, 600);
}

function disableKeyboard() {
  document.querySelectorAll('.key').forEach(b => b.disabled = true);
}

document.getElementById('btnNext').addEventListener('click', () => {
  wordIndex++;
  if (wordIndex < WORDS.length) {
    loadWord();
  } else {
    showEndScreen();
  }
});

function showEndScreen() {
  document.getElementById('gameArea').style.display = 'none';
  const endScreen = document.getElementById('end-screen');
  endScreen.classList.add('visible');

  const wins = wordResults.filter(Boolean).length;

  const title = document.getElementById('endTitle');
  if (wins === WORDS.length) {
    title.textContent = '¡EXPERTO EN LFPIORPI! 🏆';
    title.style.color = '#4ADE80';
  } else if (wins >= 3) {
    title.textContent = 'MUY BIEN — CASI PERFECTO';
    title.style.color = 'var(--amber)';
  } else {
    title.textContent = 'HAY QUE REPASAR LOS CONCEPTOS';
    title.style.color = 'var(--red)';
  }

  document.getElementById('endScore').textContent =
    `Palabras correctas: ${wins} / ${WORDS.length}`;

  // Tarjetas de repaso
  const review = document.getElementById('wordsReview');
  review.innerHTML = '';
  WORDS.forEach((entry, i) => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.style.borderLeftColor = wordResults[i] ? 'var(--green)' : 'var(--red)';
    card.innerHTML = `
      <div class="wc-word">${wordResults[i] ? '✅' : '❌'}  ${entry.word}</div>
      <div class="wc-hint">${entry.hint}</div>
    `;
    review.appendChild(card);
  });

  // Progress final
  renderProgress();
}

// Teclado físico
document.addEventListener('keydown', e => {
  const letter = e.key.toUpperCase();
  if (!ALPHABET.includes(letter)) return;
  const btn = [...document.querySelectorAll('.key')]
    .find(b => b.textContent === letter && !b.disabled);
  if (btn) guess(letter, btn);
});

// Arrancar
initGame();
</script>
</body>
</html>
