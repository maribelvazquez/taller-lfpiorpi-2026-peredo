<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahorcado LFPIORPI 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0D2137;
    --navy2:   #1C3557;
    --red:     #B91C1C;
    --darkred: #7F1D1D;
    --amber:   #D97706;
    --green:   #166534;
    --teal:    #0E7490;
    --cream:   #FDF8F0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'IBM Plex Sans',sans-serif;
    background:var(--navy); color:var(--cream);
    min-height:100vh; padding:0 16px 40px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px);
    pointer-events:none; z-index:0;
  }

  header {
    width:100%; max-width:820px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 0 16px;
    border-bottom:2px solid rgba(255,255,255,.1);
    position:relative; z-index:1;
  }
  .brand { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:3px; color:rgba(255,255,255,.35); }
  .game-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; }
  .game-title span { color:var(--amber); }
  .home-btn {
    padding:7px 16px;
    border:1px solid rgba(255,255,255,.2);
    border-radius:6px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:1px; color:rgba(255,255,255,.5);
    text-decoration:none; transition:all .2s;
  }
  .home-btn:hover { border-color:var(--amber); color:var(--amber); }

  /* Progress strip */
  .progress-strip {
    width:100%; max-width:820px; margin:0 auto;
    display:flex; gap:6px; margin-top:20px;
    position:relative; z-index:1;
  }
  .prog-dot { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,.1); transition:background .4s; }
  .prog-dot.done    { background:#22C55E; }
  .prog-dot.current { background:var(--amber); }
  .prog-dot.failed  { background:var(--red); }

  /* Dificultad badge */
  .diff-badge {
    width:100%; max-width:820px; margin:16px auto 0;
    display:flex; align-items:center; gap:10px;
    position:relative; z-index:1;
  }
  .diff-label {
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.3);
  }
  .diff-pill {
    padding:3px 12px; border-radius:20px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; font-weight:600; letter-spacing:1px;
  }
  .diff-facil  { background:rgba(22,101,52,.3); color:#86EFAC; border:1px solid rgba(22,101,52,.5); }
  .diff-medio  { background:rgba(217,119,6,.3); color:#FCD34D; border:1px solid rgba(217,119,6,.5); }
  .diff-dificil{ background:rgba(185,28,28,.3); color:#FCA5A5; border:1px solid rgba(185,28,28,.5); }

  /* Main grid */
  main {
    width:100%; max-width:820px; margin:24px auto 0;
    display:grid; grid-template-columns:240px 1fr; gap:28px;
    position:relative; z-index:1;
  }
  @media(max-width:600px){ main{ grid-template-columns:1fr; } }

  /* Horca */
  .gallows-panel { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .gallows-wrap {
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    border-radius:12px; padding:16px; width:100%;
  }
  svg#gallows { width:100%; height:190px; display:block; }

  .attempts-display {
    width:100%; background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1); border-radius:8px; padding:12px 16px; text-align:center;
  }
  .attempts-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.4); margin-bottom:6px; }
  .attempts-dots { display:flex; gap:8px; justify-content:center; }
  .dot { width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); transition:all .3s; }
  .dot.used { background:var(--red); border-color:var(--red); }

  .word-counter { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,.3); text-align:center; }

  /* Panel derecho */
  .game-panel { display:flex; flex-direction:column; gap:20px; }

  .hint-box {
    background:linear-gradient(135deg,rgba(13,33,55,.8),rgba(28,53,87,.8));
    border:1px solid rgba(255,255,255,.12); border-left:4px solid var(--amber);
    border-radius:8px; padding:14px 18px;
  }
  .hint-label { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--amber); margin-bottom:6px; }
  .hint-text { font-size:13px; line-height:1.6; color:rgba(255,255,255,.85); }

  .word-board { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-height:68px; align-items:center; }
  .letter-slot { width:40px; height:52px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:4px; }
  .letter-slot .revealed { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; color:var(--cream); min-height:34px; display:flex; align-items:center; justify-content:center; transition:all .3s; }
  .letter-slot .revealed.new { animation:popIn .3s cubic-bezier(.175,.885,.32,1.275); color:var(--amber); }
  @keyframes popIn { 0%{transform:scale(0) rotateY(90deg);opacity:0} 100%{transform:scale(1) rotateY(0deg);opacity:1} }
  .letter-slot .underline { width:33px; height:3px; background:rgba(255,255,255,.25); border-radius:2px; }

  .keyboard { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
  .key {
    width:38px; height:38px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15); border-radius:6px;
    font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600;
    color:var(--cream); cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; text-transform:uppercase;
  }
  .key:hover:not(:disabled) { background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.3); transform:translateY(-2px); }
  .key:disabled { cursor:default; }
  .key.correct { background:rgba(22,101,52,.5); border-color:#166534; }
  .key.wrong   { background:rgba(127,29,29,.4); border-color:var(--red); color:rgba(255,255,255,.25); }

  .status-bar { display:flex; align-items:center; justify-content:center; min-height:44px; }
  .status-msg { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; text-align:center; opacity:0; transform:translateY(8px); transition:all .4s; }
  .status-msg.show { opacity:1; transform:translateY(0); }
  .status-msg.win  { color:#4ADE80; }
  .status-msg.lose { color:var(--red); }

  .btn-next {
    display:none; margin:0 auto; padding:11px 32px;
    background:var(--amber); border:none; border-radius:6px;
    font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px;
    color:var(--navy); cursor:pointer; transition:all .2s;
  }
  .btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(217,119,6,.4); }
  .btn-next.visible { display:block; }

  /* Pantalla final */
  #end-screen { display:none; max-width:820px; margin:40px auto 0; text-align:center; position:relative; z-index:1; }
  #end-screen.visible { display:block; }
  .end-title { font-family:'Bebas Neue',sans-serif; font-size:46px; letter-spacing:4px; margin-bottom:10px; }
  .score-display { font-family:'IBM Plex Mono',monospace; font-size:16px; color:var(--amber); margin-bottom:28px; }
  .words-review { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:10px; text-align:left; margin-bottom:28px; }
  .word-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-left:4px solid var(--teal); border-radius:8px; padding:12px 16px; }
  .wc-word { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; margin-bottom:4px; }
  .wc-hint { font-size:11px; line-height:1.5; color:rgba(255,255,255,.55); }
  .btn-restart {
    padding:12px 44px; background:var(--navy2);
    border:2px solid rgba(255,255,255,.2); border-radius:8px;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px;
    color:var(--cream); cursor:pointer; transition:all .2s;
  }
  .btn-restart:hover { border-color:var(--amber); color:var(--amber); }

  footer { max-width:820px; margin:40px auto 0; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.18); text-align:center; position:relative; z-index:1; }
</style>
</head>
<body>

<header>
  <span class="brand">LFPIORPI 2026</span>
  <span class="game-title">AHORCADO <span>LFPIORPI</span></span>
  <a class="home-btn" href="../index.html">← INICIO</a>
</header>

<div class="progress-strip" id="progressStrip"></div>
<div class="diff-badge"><span class="diff-label">DIFICULTAD</span><span class="diff-pill" id="diffPill"></span></div>

<main id="gameArea">
  <div class="gallows-panel">
    <div class="gallows-wrap">
      <svg id="gallows" viewBox="0 0 160 190">
        <line x1="20" y1="182" x2="140" y2="182" stroke="rgba(255,255,255,.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="182" x2="50"  y2="16"  stroke="rgba(255,255,255,.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="16"  x2="110" y2="16"  stroke="rgba(255,255,255,.35)" stroke-width="4" stroke-linecap="round"/>
        <line x1="110" y1="16" x2="110" y2="36"  stroke="rgba(255,255,255,.35)" stroke-width="3" stroke-linecap="round"/>
        <circle id="h-head" cx="110" cy="50" r="13" stroke="#EF4444" stroke-width="2.5" fill="none" opacity="0"/>
        <line id="h-body" x1="110" y1="63" x2="110" y2="112" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line id="h-larm" x1="110" y1="75" x2="86"  y2="98"  stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line id="h-rarm" x1="110" y1="75" x2="134" y2="98"  stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line id="h-lleg" x1="110" y1="112" x2="88" y2="142" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <line id="h-rleg" x1="110" y1="112" x2="132" y2="142" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
      </svg>
    </div>
    <div class="attempts-display">
      <div class="attempts-label">Intentos restantes</div>
      <div class="attempts-dots" id="attemptsDots"></div>
    </div>
    <div class="word-counter" id="wordCounter"></div>
  </div>

  <div class="game-panel">
    <div class="hint-box">
      <div class="hint-label">📌 Pista</div>
      <div class="hint-text" id="hintText"></div>
    </div>
    <div class="word-board" id="wordBoard"></div>
    <div class="status-bar"><div class="status-msg" id="statusMsg"></div></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="btn-next" id="btnNext">SIGUIENTE →</button>
  </div>
</main>

<div id="end-screen">
  <div class="end-title" id="endTitle"></div>
  <div class="score-display" id="endScore"></div>
  <div class="words-review" id="wordsReview"></div>
  <button class="btn-restart" onclick="initGame()">⟳  JUGAR DE NUEVO</button>
</div>

<footer>LFPIORPI DOF 16-07-2025 · Art. 17, 18, 32, 33, 54 · Herramienta didáctica</footer>

<script>
// 10 palabras — dificultad progresiva (fácil → medio → difícil)
const WORDS = [
  { word:"AVISO",        diff:"facil",
    hint:"Reporte obligatorio que presenta el sujeto obligado ante la SHCP, a más tardar el día 17 del mes siguiente a la operación que superó el umbral del Art. 17." },
  { word:"UMBRAL",       diff:"facil",
    hint:"Monto mínimo expresado en veces el valor diario de la UMA que, al ser alcanzado o superado, activa la obligación de identificar, integrar expediente o presentar aviso." },
  { word:"EFECTIVO",     diff:"facil",
    hint:"Medio de pago cuya recepción está prohibida por el Art. 32 a partir de ciertos montos. Para vehículos el límite es 3,210 UMA ($376,565 con UMA 2026)." },
  { word:"EXPEDIENTE",   diff:"medio",
    hint:"Conjunto de documentos que el sujeto obligado integra para identificar y verificar la identidad del cliente conforme al Art. 18 Fracc. I y las Reglas de Carácter General." },
  { word:"SANCION",      diff:"medio",
    hint:"Consecuencia jurídica del incumplimiento. El Art. 54 establece tres niveles: 200–2,000 UMA, 2,000–10,000 UMA, y 10,000–65,000 UMA o hasta el 100% del valor de la operación." },
  { word:"FRACCION",     diff:"medio",
    hint:"Cada una de las 16 actividades vulnerables listadas en el Art. 17 de la LFPIORPI. La VIII corresponde a vehículos y la V a inmuebles, entre otras." },
  { word:"CONTROLADOR",  diff:"medio",
    hint:"Adjetivo que califica a la persona que ejerce control sobre una persona moral aunque no sea el propietario formal mayoritario. Combinado con Beneficiario da el concepto clave del Art. 33." },
  { word:"BENEFICIARIO", diff:"dificil",
    hint:"Persona física que en última instancia posee o controla más del 25% de una persona moral, o que la controla por cualquier otro medio. Su identificación es obligatoria bajo los Arts. 33, 33 Bis y 33 Ter." },
  { word:"REINCIDENCIA", diff:"dificil",
    hint:"Cometer la misma infracción dentro de los dos años siguientes a que quedó firme una sanción anterior. La SHCP la considera agravante para graduar la multa conforme al Art. 60." },
  { word:"FIDEICOMISO",  diff:"dificil",
    hint:"Figura jurídica cuyo fideicomisario puede ser un Beneficiario Controlador oculto. La LFPIORPI obliga a identificar a la persona física que en última instancia recibe los beneficios." },
];

const MAX_WRONG = 6;
const BODY_PARTS = ['h-head','h-body','h-larm','h-rarm','h-lleg','h-rleg'];
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const DIFF_LABELS = { facil:'FÁCIL', medio:'MEDIO', dificil:'DIFÍCIL' };

let wordIndex, wrongCount, guessed, currentWord, wordResults;

function initGame() {
  wordIndex   = 0;
  wordResults = [];
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('gameArea').style.display = '';
  document.getElementById('progressStrip').style.display = '';
  document.getElementById('diffPill').parentElement.style.display = '';
  loadWord();
}

function loadWord() {
  const entry   = WORDS[wordIndex];
  currentWord   = entry.word.toUpperCase();
  wrongCount    = 0;
  guessed       = new Set();

  BODY_PARTS.forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('opacity','0');
    el.style.transition = '';
  });

  document.getElementById('hintText').textContent = entry.hint;
  document.getElementById('wordCounter').textContent = 'Palabra ' + (wordIndex+1) + ' de ' + WORDS.length;

  const pill = document.getElementById('diffPill');
  pill.textContent = DIFF_LABELS[entry.diff];
  pill.className = 'diff-pill diff-' + entry.diff;

  renderBoard(); renderDots(); renderKeyboard();

  const msg = document.getElementById('statusMsg');
  msg.textContent=''; msg.className='status-msg';
  document.getElementById('btnNext').classList.remove('visible');
  document.getElementById('btnNext').textContent = wordIndex < WORDS.length-1 ? 'SIGUIENTE PALABRA →' : 'VER RESULTADOS →';

  renderProgress();
}

function renderBoard() {
  const board = document.getElementById('wordBoard');
  board.innerHTML = '';
  [...currentWord].forEach((letter,i) => {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    const rev = document.createElement('div');
    rev.className = 'revealed';
    rev.id = 'slot-' + i;
    rev.dataset.letter = letter;
    rev.textContent = guessed.has(letter) ? letter : '';
    const ul = document.createElement('div');
    ul.className = 'underline';
    slot.appendChild(rev); slot.appendChild(ul);
    board.appendChild(slot);
  });
}

function renderDots() {
  const wrap = document.getElementById('attemptsDots');
  wrap.innerHTML = '';
  for(let i=0;i<MAX_WRONG;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i<wrongCount?' used':'');
    wrap.appendChild(d);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ALPHABET.forEach(letter => {
    const btn = document.createElement('button');
    btn.className='key'; btn.textContent=letter;
    btn.onclick = () => guess(letter, btn);
    kb.appendChild(btn);
  });
}

function renderProgress() {
  const strip = document.getElementById('progressStrip');
  strip.innerHTML = '';
  WORDS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot';
    if(i < wordIndex)  d.classList.add(wordResults[i] ? 'done' : 'failed');
    else if(i===wordIndex) d.classList.add('current');
    strip.appendChild(d);
  });
}

function guess(letter, btn) {
  if(guessed.has(letter)) return;
  guessed.add(letter);
  const correct = currentWord.includes(letter);
  btn.disabled = true;
  btn.classList.add(correct ? 'correct' : 'wrong');

  if(correct) {
    document.querySelectorAll('[data-letter="'+letter+'"]').forEach(el => {
      el.textContent = letter;
      el.classList.add('new');
      setTimeout(() => el.classList.remove('new'), 600);
    });
    checkWin();
  } else {
    wrongCount++;
    renderDots();
    const part = document.getElementById(BODY_PARTS[wrongCount-1]);
    if(part){ part.style.transition='opacity .4s ease'; part.setAttribute('opacity','1'); }
    checkLose();
  }
}

function checkWin() {
  if(![...currentWord].every(l => guessed.has(l))) return;
  wordResults.push(true);
  const msg = document.getElementById('statusMsg');
  msg.textContent='¡CORRECTO! 🎯'; msg.className='status-msg win show';
  disableKb(); renderProgress();
  setTimeout(() => document.getElementById('btnNext').classList.add('visible'), 500);
}

function checkLose() {
  if(wrongCount < MAX_WRONG) return;
  wordResults.push(false);
  document.querySelectorAll('.revealed').forEach(el => {
    if(!el.textContent){ el.textContent=el.dataset.letter; el.style.color='var(--red)'; }
  });
  const msg = document.getElementById('statusMsg');
  msg.textContent='Era: '+currentWord; msg.className='status-msg lose show';
  disableKb(); renderProgress();
  setTimeout(() => document.getElementById('btnNext').classList.add('visible'), 500);
}

function disableKb() { document.querySelectorAll('.key').forEach(b => b.disabled=true); }

document.getElementById('btnNext').addEventListener('click', () => {
  wordIndex++;
  if(wordIndex < WORDS.length) loadWord();
  else showEndScreen();
});

function showEndScreen() {
  document.getElementById('gameArea').style.display='none';
  document.getElementById('diffPill').parentElement.style.display='none';
  const end = document.getElementById('end-screen');
  end.classList.add('visible');

  const wins = wordResults.filter(Boolean).length;
  const title = document.getElementById('endTitle');
  if(wins===WORDS.length){ title.textContent='¡EXPERTO TOTAL! 🏆'; title.style.color='#4ADE80'; }
  else if(wins>=7){ title.textContent='EXCELENTE — CASI PERFECTO'; title.style.color='var(--amber)'; }
  else if(wins>=5){ title.textContent='BUEN TRABAJO — SIGUE REPASANDO'; title.style.color='var(--amber)'; }
  else { title.textContent='HAY QUE REPASAR LOS CONCEPTOS'; title.style.color='var(--red)'; }

  document.getElementById('endScore').textContent='Palabras correctas: '+wins+' / '+WORDS.length;

  const review = document.getElementById('wordsReview');
  review.innerHTML='';
  WORDS.forEach((entry,i) => {
    const card=document.createElement('div');
    card.className='word-card';
    card.style.borderLeftColor=wordResults[i]?'#22C55E':'var(--red)';
    card.innerHTML=`<div class="wc-word">${wordResults[i]?'✅':'❌'}  ${entry.word}</div><div class="wc-hint">${entry.hint}</div>`;
    review.appendChild(card);
  });
  renderProgress();
}

document.addEventListener('keydown', e => {
  const letter = e.key.toUpperCase();
  if(!ALPHABET.includes(letter)) return;
  const btn = [...document.querySelectorAll('.key')].find(b => b.textContent===letter && !b.disabled);
  if(btn) guess(letter, btn);
});

initGame();
</script>
</body>
</html>
