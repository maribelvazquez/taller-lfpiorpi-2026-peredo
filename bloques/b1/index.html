<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EL NUEVO PARADIGMA LFPIORPI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {--navy:#0D2137;--accent:#0E7490;--cream:#FDF8F0;--muted:rgba(255,255,255,.4);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--navy);color:var(--cream);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;gap:10px;}
  .hd-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .hd-pill{padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--accent);white-space:nowrap;flex-shrink:0;}
  .hd-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hd-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;display:none;}
  .home-btn{padding:6px 12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-decoration:none;flex-shrink:0;white-space:nowrap;}

  /* MAIN */
  .main{display:flex;flex:1;overflow:hidden;}

  /* SLIDE AREA */
  .slide-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#070f1a;touch-action:pan-y;}
  .slide-container{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .slide{display:none;max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;user-select:none;-webkit-user-select:none;}
  .slide.active{display:block;}

  /* TOUCH HINT */
  .touch-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:1px;pointer-events:none;transition:opacity .5s;}

  /* NAV BAR */
  .nav-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,.5);flex-shrink:0;border-top:1px solid rgba(255,255,255,.06);}
  .nav-btn{padding:10px 20px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:transparent;color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;transition:all .15s;min-width:50px;}
  .nav-btn:hover:not(:disabled),.nav-btn:active:not(:disabled){border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,.05);}
  .nav-btn:disabled{opacity:.2;cursor:default;}
  .counter{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);min-width:60px;text-align:center;}
  .progress-bar{height:3px;background:rgba(255,255,255,.1);flex:1;max-width:200px;border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}

  /* SIDE PANEL — solo desktop */
  .side-panel{width:180px;flex-shrink:0;overflow-y:auto;border-left:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.2);padding:10px 6px;display:flex;flex-direction:column;gap:5px;}
  .side-panel::-webkit-scrollbar{width:3px;}
  .side-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
  .side-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);padding:2px 2px 6px;text-transform:uppercase;text-align:center;}
  .thumb{border:2px solid transparent;border-radius:5px;overflow:hidden;cursor:pointer;position:relative;transition:border-color .15s;flex-shrink:0;}
  .thumb:hover,.thumb:active{border-color:rgba(255,255,255,.3);}
  .thumb.active{border-color:var(--accent);}
  .thumb img{width:100%;display:block;}
  .thumb span{position:absolute;bottom:3px;right:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(0,0,0,.65);padding:1px 4px;border-radius:3px;}

  /* MOBILE */
  @media(max-width:600px){
    .side-panel{display:none;}
    .hd-sub{display:none;}
    .nav-btn{padding:12px 18px;font-size:16px;}
    .progress-bar{max-width:80px;}
  }
  @media(min-width:601px){
    .hd-sub{display:block;}
  }
</style>
</head>
<body>
<header>
  <div class="hd-left">
    <span class="hd-pill">BLOQUE I · ART. 18 & REFORMA</span>
    <div>
      <div class="hd-title">EL NUEVO PARADIGMA LFPIORPI</div>
      <div class="hd-sub">LFPIORPI 2025 · 13 SLIDES</div>
    </div>
  </div>
  <a class="home-btn" href="../../index.html">← INICIO</a>
</header>
<div class="main">
  <div class="slide-area" id="slideArea">
    <div class="slide-container" id="slideContainer">
      <img class="slide" id="s0" src="slides/slide-01.jpg" alt="Slide 1" loading="lazy">
      <img class="slide" id="s1" src="slides/slide-02.jpg" alt="Slide 2" loading="lazy">
      <img class="slide" id="s2" src="slides/slide-03.jpg" alt="Slide 3" loading="lazy">
      <img class="slide" id="s3" src="slides/slide-04.jpg" alt="Slide 4" loading="lazy">
      <img class="slide" id="s4" src="slides/slide-05.jpg" alt="Slide 5" loading="lazy">
      <img class="slide" id="s5" src="slides/slide-06.jpg" alt="Slide 6" loading="lazy">
      <img class="slide" id="s6" src="slides/slide-07.jpg" alt="Slide 7" loading="lazy">
      <img class="slide" id="s7" src="slides/slide-08.jpg" alt="Slide 8" loading="lazy">
      <img class="slide" id="s8" src="slides/slide-09.jpg" alt="Slide 9" loading="lazy">
      <img class="slide" id="s9" src="slides/slide-10.jpg" alt="Slide 10" loading="lazy">
      <img class="slide" id="s10" src="slides/slide-11.jpg" alt="Slide 11" loading="lazy">
      <img class="slide" id="s11" src="slides/slide-12.jpg" alt="Slide 12" loading="lazy">
      <img class="slide" id="s12" src="slides/slide-13.jpg" alt="Slide 13" loading="lazy">
      <div class="touch-hint" id="hint">‹ desliza ›</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" id="btnPrev" onclick="prev()">◀</button>
      <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
      <div class="counter" id="counter">1/13</div>
      <div class="progress-bar"><div class="progress-fill" id="pbar2"></div></div>
      <button class="nav-btn" id="btnNext" onclick="next()">▶</button>
    </div>
  </div>
  <div class="side-panel">
    <div class="side-label">Slides</div>
    <div class="thumb" id="t0" onclick="goto(0)"><img src="slides/slide-01.jpg" alt=""><span>1</span></div>
    <div class="thumb" id="t1" onclick="goto(1)"><img src="slides/slide-02.jpg" alt=""><span>2</span></div>
    <div class="thumb" id="t2" onclick="goto(2)"><img src="slides/slide-03.jpg" alt=""><span>3</span></div>
    <div class="thumb" id="t3" onclick="goto(3)"><img src="slides/slide-04.jpg" alt=""><span>4</span></div>
    <div class="thumb" id="t4" onclick="goto(4)"><img src="slides/slide-05.jpg" alt=""><span>5</span></div>
    <div class="thumb" id="t5" onclick="goto(5)"><img src="slides/slide-06.jpg" alt=""><span>6</span></div>
    <div class="thumb" id="t6" onclick="goto(6)"><img src="slides/slide-07.jpg" alt=""><span>7</span></div>
    <div class="thumb" id="t7" onclick="goto(7)"><img src="slides/slide-08.jpg" alt=""><span>8</span></div>
    <div class="thumb" id="t8" onclick="goto(8)"><img src="slides/slide-09.jpg" alt=""><span>9</span></div>
    <div class="thumb" id="t9" onclick="goto(9)"><img src="slides/slide-10.jpg" alt=""><span>10</span></div>
    <div class="thumb" id="t10" onclick="goto(10)"><img src="slides/slide-11.jpg" alt=""><span>11</span></div>
    <div class="thumb" id="t11" onclick="goto(11)"><img src="slides/slide-12.jpg" alt=""><span>12</span></div>
    <div class="thumb" id="t12" onclick="goto(12)"><img src="slides/slide-13.jpg" alt=""><span>13</span></div>
  </div>
</div>

<script>
const N = 13;
let cur = 0, touchStartX = 0, touchStartY = 0, hintShown = false;

function update() {
  document.querySelectorAll('.slide').forEach((s,i) => s.classList.toggle('active', i===cur));
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===cur));
  document.getElementById('counter').textContent = (cur+1)+'/'+N;
  const pct = ((cur+1)/N*100)+'%';
  document.getElementById('pbar').style.width = pct;
  document.getElementById('pbar2').style.width = pct;
  document.getElementById('btnPrev').disabled = cur===0;
  document.getElementById('btnNext').disabled = cur===N-1;
  const t = document.getElementById('t'+cur);
  if(t) t.scrollIntoView({block:'nearest'});
}

function next() { if(cur<N-1){cur++;update();} }
function prev() { if(cur>0){cur--;update();} }
function goto(i) { cur=i; update(); }

// Teclado
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});

// Touch / Swipe
const area = document.getElementById('slideContainer');
area.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

area.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if(dx < 0) next(); else prev();
    if(!hintShown) {
      document.getElementById('hint').style.opacity = '0';
      hintShown = true;
    }
  }
}, {passive:true});

// Tap zonas (mitad izq = anterior, mitad der = siguiente)
area.addEventListener('click', e => {
  const w = area.offsetWidth;
  if(e.clientX < w/2) prev(); else next();
});

// Ocultar hint después de 3s
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
  hintShown = true;
}, 3000);

update();
</script>
</body>
</html>
